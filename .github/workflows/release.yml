name: Release

# Publish to PyPI via OIDC trusted publishing — no long-lived tokens.
#
# Triggered by pushing a strict-semver tag (`v0.2.0`, `v1.0.0`, etc.). The
# trusted-publisher configuration on pypi.org pins this exact workflow
# filename (`release.yml`) and the environment name `pypi`. Changing either
# requires updating the publisher config on PyPI first.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Verify tag matches pyproject.toml version
        run: |
          tag="${GITHUB_REF##refs/tags/}"
          tag_version="${tag#v}"
          project_version=$(grep -E '^version = ' pyproject.toml | head -1 | sed -E 's/version = "(.*)"/\1/')
          if [[ "$tag_version" != "$project_version" ]]; then
            echo "::error::Tag version ($tag_version) does not match pyproject.toml version ($project_version)."
            echo "Bump pyproject.toml, commit, then re-tag."
            exit 1
          fi
          if [[ ! "$tag_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag $tag is not strict semver (MAJOR.MINOR.PATCH). Release tags must match ^v[0-9]+\\.[0-9]+\\.[0-9]+$."
            exit 1
          fi

      - name: Run tests (excluding live-network tests)
        run: |
          uv sync --all-extras
          uv run pytest --ignore=tests/test_protocol_live.py

      - name: Build sdist and wheel
        run: uv build

      - name: Smoke-test the built wheel
        run: |
          # Install into a throwaway venv and confirm `coros-mcp help` runs.
          uv venv /tmp/wheel-test
          uv pip install --python /tmp/wheel-test/bin/python dist/*.whl
          /tmp/wheel-test/bin/coros-mcp help | grep -q "Coros MCP Server"

      - name: Upload dists
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/coros-training-mcp
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
